name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Prepare public site
        run: |
          mkdir -p _site/work/dataself _site/output/pdf
          cp index.html styles.css script.js favicon.svg social-card.svg site.webmanifest robots.txt sitemap.xml CNAME 404.html _site/
          cp work/dataself/index.html work/dataself/styles.css _site/work/dataself/
          cp output/pdf/DataSelf-Product-Case-Study.pdf _site/output/pdf/
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
